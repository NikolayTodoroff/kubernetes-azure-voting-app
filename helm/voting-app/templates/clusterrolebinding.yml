apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-observer-binding
subjects:
  - kind: Group
    name: {{ .Values.rbac.adminGroupObjectId | quote }}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-observer
  apiGroup: rbac.authorization.k8s.io