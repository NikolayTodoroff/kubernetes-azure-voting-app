trigger:
  branches:
    include:
      - main
  paths:
    include:
      - app/**
      - helm/**
      - infra/**

parameters:
  - name: runDeploy
    displayName: 'Deploy (unchecked = build only)'
    type: boolean
    default: false

  - name: environment
    displayName: 'Environment'
    type: string
    default: 'dev'
    values:
      - dev
      - prod

pool:
  vmImage: 'ubuntu-latest'

variables:
  - ${{ if eq(parameters.environment, 'dev') }}:
    - group: aksvoter-dev-vars
  - ${{ if eq(parameters.environment, 'prod') }}:
    - group: aksvoter-prod-vars
  - ${{ if eq(parameters.environment, 'dev') }}:
    - name: acrName
      value: 'acraksvoterdev'
  - ${{ if eq(parameters.environment, 'prod') }}:
    - name: acrName
      value: 'acraksvoterprod'
  - name: imageRepository
    value: 'azure-vote-front'
  - name: imageTag
    value: '$(Build.BuildId)'
  - name: aksResourceGroup
    value: 'rg-main-aksvoter-${{ parameters.environment }}'
  - name: aksClusterName
    value: 'aks-aksvoter-${{ parameters.environment }}'
  - name: helmReleaseName
    value: 'voting-app'
  - name: helmChartPath
    value: 'helm/voting-app'
  - name: terraformVersion
    value: '1.15.5'
  - name: workingDirectory
    value: '$(System.DefaultWorkingDirectory)/infra/main'
  - name: backendResourceGroup
    value: 'rg-tfstate-${{ parameters.environment }}'
  - name: backendStorageAccount
    value: 'staksvoter${{ parameters.environment }}'
  - name: backendContainer
    value: 'tfstate'
  - name: backendKey
    value: 'aksvoter-${{ parameters.environment }}.tfstate'
  - name: tfVarsFile
    value: '$(System.DefaultWorkingDirectory)/infra/env/${{ parameters.environment }}.tfvars'

stages:
  - stage: Build
    displayName: 'Build and Push Image'
    jobs:
      - job: Build
        displayName: 'Docker Build and Push'
        steps:
          - task: AzureCLI@2
            displayName: 'Build and Push to ACR'
            inputs:
              azureSubscription: 'service_connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr login --name $(acrName)
                docker build -t $(acrName).azurecr.io/$(imageRepository):$(imageTag) ./app/azure-vote
                docker push $(acrName).azurecr.io/$(imageRepository):$(imageTag)

  - stage: Validate
    displayName: 'Validate Terraform'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: Validate
        displayName: 'Terraform Validate'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: 'service_connection'
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Validate'
            inputs:
              command: 'validate'
              workingDirectory: $(workingDirectory)

          - bash: |
              curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
            displayName: 'Install TFLint'

          - bash: |
              tflint --init --config=../.tflint.hcl
              tflint --config=../.tflint.hcl
            displayName: 'TFLint'
            workingDirectory: $(workingDirectory)

  - stage: Plan
    displayName: 'Plan Terraform'
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: Plan
        displayName: 'Terraform Plan'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: 'service_connection'
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: $(backendKey)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              command: 'plan'
              workingDirectory: $(workingDirectory)
              environmentServiceNameAzureRM: 'service_connection'
              commandOptions: '-out=$(Pipeline.Workspace)/tfplan -var-file="$(tfVarsFile)"'
            env:
              TF_VAR_pipeline_sp_object_id: $(pipelineSpObjectId)
              TF_VAR_current_user_object_id: $(currentUserObjectId)
              TF_VAR_aks_admin_group_object_id: $(aksAdminGroupObjectId)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Terraform Plan'
            inputs:
              targetPath: '$(Pipeline.Workspace)/tfplan'
              artifactName: 'tfplan'

  - stage: DeployInfra
    displayName: 'Apply Terraform'
    dependsOn: Plan
    condition: succeeded()
    jobs:
      - deployment: DeployInfra
        displayName: 'Terraform Apply'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'infrastructure-${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: 'Install Terraform'
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: TerraformTaskV4@4
                  displayName: 'Terraform Init'
                  inputs:
                    command: 'init'
                    workingDirectory: $(workingDirectory)
                    backendServiceArm: 'service_connection'
                    backendAzureRmResourceGroupName: $(backendResourceGroup)
                    backendAzureRmStorageAccountName: $(backendStorageAccount)
                    backendAzureRmContainerName: $(backendContainer)
                    backendAzureRmKey: $(backendKey)

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Terraform Plan'
                  inputs:
                    artifactName: 'tfplan'
                    targetPath: '$(Pipeline.Workspace)/tfplan'

                - task: TerraformTaskV4@4
                  displayName: 'Terraform Apply'
                  inputs:
                    command: 'apply'
                    workingDirectory: $(workingDirectory)
                    environmentServiceNameAzureRM: 'service_connection'
                    commandOptions: '$(Pipeline.Workspace)/tfplan/tfplan'

  - stage: DeployApp
    displayName: 'Deploy Application'
    dependsOn: DeployInfra
    condition: succeeded()
    jobs:
      - deployment: DeployApp
        displayName: 'Helm Deploy'
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'application-${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Install kubectl and kubelogin'
                  inputs:
                    azureSubscription: 'service_connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks install-cli

                - task: AzureCLI@2
                  displayName: 'Get AKS Credentials'
                  inputs:
                    azureSubscription: 'service_connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(aksResourceGroup) \
                        --name $(aksClusterName) \
                        --overwrite-existing
                      kubelogin convert-kubeconfig -l azurecli  

                - task: AzureCLI@2
                  displayName: 'Helm Deploy'
                  inputs:
                    azureSubscription: 'service_connection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      helm upgrade --install $(helmReleaseName) $(helmChartPath) \
                        --values $(helmChartPath)/values.yml \
                        --values $(helmChartPath)/values-${{ parameters.environment }}.yml \
                        --set frontend.image.repository=$(acrName).azurecr.io/azure-vote-front \
                        --set frontend.image.tag=$(imageTag) \
                        --namespace voting \
                        --create-namespace \
                        --wait \
                        --timeout 10m